  <text x="604" y="150" font-size="11" fill="#666">Total Users</text>
  <text x="604" y="180" font-size="28" font-weight="bold" fill="#1a1a1a">156</text>

  <!-- Bar chart -->
  <rect x="32" y="220" width="410" height="200" rx="8" fill="none" stroke="#d4d4d4" stroke-width="1"/>
  <text x="52" y="248" font-size="12" font-weight="bold" fill="#1a1a1a">Events by Category</text>
  <rect x="80" y="370" width="30" height="30" rx="2" fill="#a3a3a3"/>
  <rect x="130" y="340" width="30" height="60" rx="2" fill="#a3a3a3"/>
  <rect x="180" y="350" width="30" height="50" rx="2" fill="#a3a3a3"/>
  <rect x="230" y="320" width="30" height="80" rx="2" fill="#a3a3a3"/>
  <rect x="280" y="360" width="30" height="40" rx="2" fill="#a3a3a3"/>
  <rect x="330" y="300" width="30" height="100" rx="2" fill="#a3a3a3"/>
  <line x1="60" y1="390" x2="380" y2="390" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Pie chart -->
  <rect x="460" y="220" width="410" height="200" rx="8" fill="none" stroke="#d4d4d4" stroke-width="1"/>
  <text x="480" y="248" font-size="12" font-weight="bold" fill="#1a1a1a">Event Ratio</text>
  <circle cx="620" cy="330" r="50" fill="none" stroke="#a3a3a3" stroke-width="18" stroke-dasharray="220 94"/>
  <circle cx="620" cy="330" r="50" fill="none" stroke="#d4d4d4" stroke-width="18" stroke-dasharray="0 0 94 220" stroke-dashoffset="-50"/>
  <rect x="550" y="400" width="8" height="8" fill="#a3a3a3"/>
  <text x="564" y="408" font-size="10" fill="#666">Published</text>
  <rect x="630" y="400" width="8" height="8" fill="#d4d4d4"/>
  <text x="644" y="408" font-size="10" fill="#666">Pending</text>

  <!-- Recent lists -->
  <rect x="32" y="440" width="410" height="140" rx="8" fill="none" stroke="#d4d4d4" stroke-width="1"/>
  <text x="52" y="468" font-size="12" font-weight="bold" fill="#1a1a1a">Recent Pending Events</text>
  <line x1="52" y1="476" x2="422" y2="476" stroke="#e5e5e5" stroke-width="1"/>
  <rect x="52" y="484" width="370" height="24" fill="#fafafa"/><text x="60" y="500" font-size="11" fill="#666">• Tech Seminar 2026</text>
  <rect x="52" y="512" width="370" height="24" fill="#fafafa"/><text x="60" y="528" font-size="11" fill="#666">• Art Exhibition</text>
  <rect x="52" y="540" width="370" height="24" fill="#fafafa"/><text x="60" y="556" font-size="11" fill="#666">• Music Festival</text>

  <rect x="460" y="440" width="410" height="140" rx="8" fill="none" stroke="#d4d4d4" stroke-width="1"/>
  <text x="480" y="468" font-size="12" font-weight="bold" fill="#1a1a1a">Recent Published Events</text>
  <line x1="480" y1="476" x2="850" y2="476" stroke="#e5e5e5" stroke-width="1"/>
  <rect x="480" y="484" width="370" height="24" fill="#fafafa"/><text x="488" y="500" font-size="11" fill="#666">• Workshop AI</text>
  <rect x="480" y="512" width="370" height="24" fill="#fafafa"/><text x="488" y="528" font-size="11" fill="#666">• Campus Expo</text>
  <rect x="480" y="540" width="370" height="24" fill="#fafafa"/><text x="488" y="556" font-size="11" fill="#666">• Photography Class</text>
