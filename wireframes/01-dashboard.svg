  <rect x="16" y="14" width="28" height="28" rx="6" fill="#1a1a1a"/>
  <text x="20" y="33" font-size="12" font-weight="bold" fill="#fff">T</text>
  <text x="52" y="34" font-size="16" font-weight="bold" fill="#1a1a1a">Ticketify</text>

  <!-- Nav links -->
  <rect x="148" y="14" width="80" height="28" rx="6" fill="#1a1a1a"/>
  <text x="162" y="33" font-size="11" fill="#fff">Dashboard</text>
  <rect x="232" y="14" width="76" height="28" rx="6" fill="none" stroke="#d4d4d4" stroke-width="1"/>
  <text x="244" y="33" font-size="11" fill="#666">Published</text>
  <rect x="312" y="14" width="66" height="28" rx="6" fill="none" stroke="#d4d4d4" stroke-width="1"/>
  <text x="324" y="33" font-size="11" fill="#666">Pending</text>
  <rect x="382" y="14" width="56" height="28" rx="6" fill="none" stroke="#d4d4d4" stroke-width="1"/>
  <text x="392" y="33" font-size="11" fill="#666">Users</text>
  <rect x="442" y="14" width="54" height="28" rx="6" fill="none" stroke="#d4d4d4" stroke-width="1"/>
  <text x="452" y="33" font-size="11" fill="#666">Roles</text>
  <rect x="500" y="14" width="82" height="28" rx="6" fill="none" stroke="#d4d4d4" stroke-width="1"/>
  <text x="514" y="33" font-size="11" fill="#666">Categories</text>
  <rect x="586" y="14" width="64" height="28" rx="6" fill="none" stroke="#d4d4d4" stroke-width="1"/>
  <text x="598" y="33" font-size="11" fill="#666">Statistik</text>

  <!-- Profile right -->
  <circle cx="828" cy="28" r="16" fill="#e5e5e5"/>
  <text x="823" y="33" font-size="10" fill="#666">⚙</text>
  <circle cx="864" cy="28" r="14" fill="#d4d4d4"/>
  <text x="859" y="33" font-size="9" fill="#666">A</text>

  <!-- Page title -->
  <text x="32" y="96" font-size="20" font-weight="bold" fill="#1a1a1a">Dashboard</text>
  <line x1="32" y1="104" x2="120" y2="104" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Stats cards -->
  <rect x="32" y="120" width="260" height="80" rx="8" fill="none" stroke="#d4d4d4" stroke-width="1"/>
  <rect x="32" y="120" width="260" height="80" rx="8" fill="#f5f5f5"/>
  <text x="52" y="150" font-size="11" fill="#666">Published Events</text>
  <text x="52" y="180" font-size="28" font-weight="bold" fill="#1a1a1a">24</text>

  <rect x="308" y="120" width="260" height="80" rx="8" fill="none" stroke="#d4d4d4" stroke-width="1"/>
  <rect x="308" y="120" width="260" height="80" rx="8" fill="#f5f5f5"/>
  <text x="328" y="150" font-size="11" fill="#666">Pending Events</text>
  <text x="328" y="180" font-size="28" font-weight="bold" fill="#1a1a1a">7</text>

  <rect x="584" y="120" width="260" height="80" rx="8" fill="none" stroke="#d4d4d4" stroke-width="1"/>
