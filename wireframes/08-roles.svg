<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Inter, sans-serif">
  <rect width="800" height="600" fill="#fff"/>
  <rect x="0" y="0" width="180" height="600" fill="#1e293b"/>
  <rect x="12" y="12" width="156" height="24" rx="4" fill="#334155"/>
  <text x="24" y="29" font-size="11" fill="#94a3b8">☰  Ticketify</text>
  <rect x="12" y="52" width="156" height="28" rx="4" fill="none" stroke="#334155" stroke-width="1"/>
  <text x="24" y="70" font-size="11" fill="#94a3b8">■  Dashboard</text>
  <rect x="12" y="86" width="156" height="28" rx="4" fill="none" stroke="#334155" stroke-width="1"/>
  <text x="24" y="104" font-size="11" fill="#94a3b8">■  Published</text>
  <rect x="12" y="120" width="156" height="28" rx="4" fill="none" stroke="#334155" stroke-width="1"/>
  <text x="24" y="138" font-size="11" fill="#94a3b8">■  Pending</text>
  <rect x="12" y="154" width="156" height="28" rx="4" fill="none" stroke="#334155" stroke-width="1"/>
  <text x="24" y="172" font-size="11" fill="#94a3b8">■  Users</text>
  <rect x="12" y="188" width="156" height="28" rx="4" fill="#3b82f6"/>
  <text x="24" y="206" font-size="11" fill="#fff">■  Roles</text>
  <rect x="12" y="222" width="156" height="28" rx="4" fill="none" stroke="#334155" stroke-width="1"/>
  <text x="24" y="240" font-size="11" fill="#94a3b8">■  Categories</text>
  <rect x="12" y="256" width="156" height="28" rx="4" fill="none" stroke="#334155" stroke-width="1"/>
  <text x="24" y="274" font-size="11" fill="#94a3b8">■  Statistik</text>

  <rect x="180" y="0" width="620" height="48" fill="#f8fafc"/>
  <line x1="180" y1="48" x2="800" y2="48" stroke="#e2e8f0" stroke-width="1"/>
  <text x="196" y="30" font-size="15" font-weight="bold" fill="#1e293b">Role Applications</text>

  <!-- Stats -->
  <rect x="196" y="56" width="185" height="56" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="212" y="76" font-size="9" fill="#d97706">Pending Requests</text>
  <text x="212" y="98" font-size="16" font-weight="bold" fill="#b45309">5</text>

  <rect x="398" y="56" width="185" height="56" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="414" y="76" font-size="9" fill="#16a34a">Approved</text>
  <text x="414" y="98" font-size="16" font-weight="bold" fill="#15803d">3</text>

  <rect x="600" y="56" width="185" height="56" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="616" y="76" font-size="9" fill="#ef4444">Rejected</text>
  <text x="616" y="98" font-size="16" font-weight="bold" fill="#dc2626">1</text>

  <!-- Search -->
  <rect x="196" y="126" width="200" height="30" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="210" y="145" font-size="10" fill="#94a3b8">🔍 Cari nama atau NIM...</text>

  <!-- Table -->
  <rect x="196" y="168" width="594" height="30" rx="6 6 0 0" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="206" y="188" font-size="9" font-weight="bold" fill="#64748b">No</text>
  <text x="240" y="188" font-size="9" font-weight="bold" fill="#64748b">Nama</text>
  <text x="340" y="188" font-size="9" font-weight="bold" fill="#64748b">NIM</text>
  <text x="410" y="188" font-size="9" font-weight="bold" fill="#64748b">UKM</text>
  <text x="500" y="188" font-size="9" font-weight="bold" fill="#64748b">Rekening</text>
  <text x="580" y="188" font-size="9" font-weight="bold" fill="#64748b">Status</text>
  <text x="660" y="188" font-size="9" font-weight="bold" fill="#64748b">Actions</text>

  <rect x="196" y="198" width="594" height="36" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="206" y="220" font-size="10" fill="#64748b">1</text>
  <text x="240" y="220" font-size="10" fill="#1e293b">Budi Santoso</text>
  <text x="340" y="220" font-size="10" fill="#64748b">123478</text>
  <text x="410" y="220" font-size="10" fill="#64748b">HMTI</text>
  <text x="500" y="220" font-size="10" fill="#64748b">10900xxxx</text>
  <rect x="580" y="204" width="50" height="18" rx="4" fill="#fffbeb"/><text x="588" y="216" font-size="8" fill="#d97706">Pending</text>
  <rect x="646" y="204" width="50" height="22" rx="4" fill="#f0fdf4"/><text x="654" y="219" font-size="8" fill="#16a34a">✓ Approve</text>
  <rect x="700" y="204" width="50" height="22" rx="4" fill="#fef2f2"/><text x="708" y="219" font-size="8" fill="#ef4444">✕ Reject</text>

  <rect x="196" y="234" width="594" height="36" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="206" y="256" font-size="10" fill="#64748b">2</text>
  <text x="240" y="256" font-size="10" fill="#1e293b">Dewi Lestari</text>
  <text x="340" y="256" font-size="10" fill="#64748b">123479</text>
  <text x="410" y="256" font-size="10" fill="#64748b">PEC</text>
  <text x="500" y="256" font-size="10" fill="#64748b">10901xxxx</text>
  <rect x="580" y="240" width="50" height="18" rx="4" fill="#fffbeb"/><text x="588" y="252" font-size="8" fill="#d97706">Pending</text>
  <rect x="646" y="240" width="50" height="22" rx="4" fill="#f0fdf4"/><text x="654" y="255" font-size="8" fill="#16a34a">✓ Approve</text>
  <rect x="700" y="240" width="50" height="22" rx="4" fill="#fef2f2"/><text x="708" y="255" font-size="8" fill="#ef4444">✕ Reject</text>

  <!-- Approve Modal -->
  <rect x="280" y="330" width="240" height="160" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
  <defs><filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/></filter></defs>
  <circle cx="400" cy="354" r="24" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="395" y="360" font-size="20" fill="#16a34a">✓</text>
  <text x="310" y="398" font-size="13" font-weight="bold" fill="#1e293b">Setujui Pengajuan?</text>
  <text x="310" y="416" font-size="10" fill="#64748b">Budi Santoso — 123478, HMTI</text>
  <rect x="300" y="440" width="90" height="28" rx="6" fill="#f1f5f9"/><text x="324" y="459" font-size="10" fill="#475569">Batal</text>
  <rect x="400" y="440" width="90" height="28" rx="6" fill="#22c55e"/><text x="417" y="459" font-size="10" fill="#fff">Setujui</text>

  <!-- Reject Modal -->
  <rect x="280" y="320" width="260" height="200" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="410" cy="346" r="16" fill="#fef2f2"/>
  <text x="406" y="351" font-size="14" fill="#ef4444">!</text>
  <text x="320" y="376" font-size="13" font-weight="bold" fill="#1e293b">Tolak Pengajuan</text>
  <text x="310" y="392" font-size="9" fill="#64748b">Dewi Lestari — 123479, PEC</text>
  <rect x="300" y="406" width="220" height="50" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="426" font-size="9" fill="#94a3b8">Alasan penolakan...</text>
  <rect x="300" y="470" width="90" height="28" rx="6" fill="#f1f5f9"/><text x="324" y="489" font-size="10" fill="#475569">Batal</text>
  <rect x="400" y="470" width="90" height="28" rx="6" fill="#ef4444"/><text x="417" y="489" font-size="10" fill="#fff">Tolak</text>
</svg>